version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # Keep @types/node on the current LTS major (Node 24). Odd-numbered
      # versions (25.x, 27.x, …) are not LTS — upgrade manually when moving
      # to the next even-numbered LTS.
      - dependency-name: "@types/node"
        update-types: [ "version-update:semver-major" ]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
