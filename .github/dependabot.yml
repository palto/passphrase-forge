version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      semver-patch-days: 5
      semver-minor-days: 7
      semver-major-days: 14
    ignore:
      # Keep @types/node on the current LTS major (Node 24). Odd-numbered
      # versions (25.x, 27.x, …) are not LTS — upgrade manually when moving
      # to the next even-numbered LTS.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      npm-patch:
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      github-actions-all:
        patterns:
          - "*"
